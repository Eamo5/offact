name: CI

on:
  push:
    paths-ignore:
      - "**/*.md"
      - '**/*.txt'
      - 'tools/__pycache__/**'
  pull_request:
    paths-ignore:
      - "**/*.md"
      - '**/*.txt'
      - 'tools/__pycache__/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install build-essential clang-18 lld-18 python3 zip

      - name: Install toolchain
        run: |
          wget https://github.com/ps5-payload-dev/pacbrew-repo/releases/latest/download/ps5-payload-dev.tar.gz
          sudo tar xf ps5-payload-dev.tar.gz -C /

      - name: Generate embedded WebUI asset
        run: |
          python3 tools/gen_assets.py frontend/index.html include/assets_index_html.h index_html

      - name: Verify generated asset is current
        run: |
          git diff --exit-code -- include/assets_index_html.h

      - name: Build daemon ELF
        run: |
          PS5_PAYLOAD_SDK=/opt/ps5-payload-sdk make clean all

      - name: Package distribution
        run: |
          PS5_PAYLOAD_SDK=/opt/ps5-payload-sdk make dist

      - name: Upload distribution zip
        uses: actions/upload-artifact@v4
        with:
          name: OffAct-dist
          path: OffAct.zip
          if-no-files-found: error

      - name: Upload daemon ELF
        uses: actions/upload-artifact@v4
        with:
          name: OffAct-elf
          path: OffAct.elf
          if-no-files-found: error

  release:
    needs: build
    permissions:
      contents: write

    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: OffAct-dist
          path: .

      - name: Create GitHub Release (pre-release)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          prerelease: true
          files: OffAct.zip
